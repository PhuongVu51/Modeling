<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        /* =========================================
           CSS BỔ SUNG CHO TRANG LOGIN (CÓ BACKGROUND)
           ========================================= */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            
            /* THÊM BACKGROUND ẢNH NẮM TAY */
            background-image: url('../image/1feccced-2277-42c4-bbca-043c5a6b4c2c.png'); /* Mày nhớ check tên file ảnh cho đúng nhé */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Giữ ảnh cố định khi scroll */
            position: relative;
        }

        /* LỚP PHỦ MỜ (OVERLAY) ĐỂ CHỮ DỄ ĐỌC HƠN */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(253, 242, 247, 0.75); /* Màu hồng nhạt mờ mờ */
            z-index: 1;
        }

        /* CARD LOGIN (HIỆU ỨNG KÍNH MỜ - GLASSMORPHISM) */
        .login-card {
            background: rgba(255, 255, 255, 0.85); /* Trắng mờ */
            backdrop-filter: blur(15px); /* Làm mờ background phía sau */
            -webkit-backdrop-filter: blur(15px);
            
            width: 100%;
            max-width: 450px; /* Nhỏ gọn hơn Register tí cho đẹp */
            padding: 50px 40px;
            border-radius: 35px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.12); /* Đổ bóng đậm hơn tí cho nổi */
            text-align: center;
            animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            position: relative; /* Nằm trên lớp overlay */
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.3); /* Viền kính */
        }

        .logo-placeholder {
            width: 100%;
            max-width: 200px; /* Nhỏ lại tí cho cân */
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            filter: drop-shadow(0 5px 10px rgba(232, 62, 140, 0.15));
        }

        .subtitle { 
            color: #666; 
            font-size: 1rem; 
            font-weight: 600;
            margin-bottom: 35px; 
            letter-spacing: 0.5px;
        }

        /* Sửa lỗi vị trí label trong form-group */
        .form-group {
            text-align: left;
            margin-bottom: 22px;
        }
        
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: #444;
        }

        /* Định dạng Input */
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid rgba(240, 242, 245, 0.7);
            border-radius: 14px;
            background: rgba(249, 250, 251, 0.8);
            font-size: 0.95rem;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: #e83e8c;
            background: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(232, 62, 140, 0.08);
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0; /* Bỏ margin cũ */
        }
        
        .label-row label { margin-bottom: 0; } /* Bỏ margin label trong row */

        .forgot-link {
            font-size: 0.8rem;
            color: #e83e8c;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            text-align: left;
            font-size: 0.9rem;
            color: #666;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #e83e8c; /* Màu hồng Y2K cho checkbox */
        }

        /* Định dạng Button */
        .btn-submit {
            background: linear-gradient(135deg, #ff4b82 0%, #800040 100%);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(255, 75, 130, 0.3);
        }
        
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 75, 130, 0.4);
        }

        .signup-link {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #666;
        }

        .signup-link a {
            color: #e83e8c;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="../image/Pink and Neon Y2K Typography Beauty Store Logo (3).png" alt="SoulSync Logo" class="logo-placeholder">
        
        <p class="subtitle">Ready to find your match?</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="your@email.com" required>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label for="password">Password</label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="keep-sync">
                <label for="keep-sync">Keep me in sync</label>
            </div>

            <button type="submit" class="btn-submit">SYNC IN 💖</button>
        </form>

        <p class="signup-link">Don't have an account yet? <a href="register.html">Join the Vibe</a></p>
    </div>

    <script>
        // Xử lý gửi AJAX tới api/login.php
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-submit');
            const originalText = btn.innerText;
            
            btn.innerText = 'CONNECTING...';
            btn.disabled = true;
            
            const formData = new FormData(this);
            try {
                // Gọi tới backend PHP
                const res = await fetch('../api/login.php', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    // Đăng nhập thành công -> Chuyển hướng về trang Home
                    window.location.href = 'home.php';
                } else {
                    // Báo lỗi nếu sai thông tin
                    alert(data.message); 
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                alert('Connection Error! Is your XAMPP/Laragon running?');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
