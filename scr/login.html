<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulSync - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

    <div class="login-card">
        <img src="D:\mô hình hóa\Modeling\image\Pink and Neon Y2K Typography Beauty Store Logo (3).png" alt="SoulSync Logo" class="logo-placeholder">
        
        <p class="subtitle">Ready to find your match?</p>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>

        <div class="form-group">
            <div class="label-row">
                <label for="password">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="keep-sync">
            <label for="keep-sync">Keep me in sync</label>
        </div>

        <button type="button" class="btn-submit" onclick="alert('Connecting hearts...')">SYNC IN</button>

        <p class="signup-link">Don't have an account yet? <a href="register.html">Join the Vibe</a></p>
    </div>

    <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Safety Tips</a>
    </div>

</body>
</html>
